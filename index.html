<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quisent - Back to the future</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --card-color: rgba(22, 33, 62, 0.92);
            --accent-color: #00f2fe;
            --solo-color: #c084fc;
            --text-color: #e2e8f0;
            --success: #4ade80;
            --danger: #f87171;
            --warning: #facc15;
        }
        * { box-sizing: border-box; font-family: sans-serif; }
        .mobile-bg-fix { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--bg-color); z-index: -1; }
        body { color: var(--text-color); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background-color: var(--card-color); padding: 25px; border-radius: 15px; width: 100%; max-width: 500px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .screen { display: none; }
        .screen.active { display: block; }
        h1, h2 { text-align: center; color: var(--accent-color); }
        .category-label { text-align: center; color: var(--warning); font-size: 14px; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; }
        .question-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; text-align: center; font-size: 18px; margin-bottom: 20px; min-height: 80px; }
        button { width: 100%; padding: 15px; border-radius: 8px; border: none; background: var(--accent-color); color: #000; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .hidden { display: none !important; }
        .logo-container { text-align: center; margin-bottom: 20px; }
        .game-logo { max-width: 100%; height: auto; max-height: 150px; }
    </style>
</head>
<body>

<div class="mobile-bg-fix"></div>

<div class="container">
    <div id="logo-area" class="logo-container">
        <img src="logo.png" alt="Logo" class="game-logo" onerror="this.style.display='none';">
    </div>

    <div id="screen-role" class="screen active">
        <h1>Quisent</h1>
        <button onclick="startSolo()">Single Player</button>
        <button onclick="switchToHost()">Host (Multi)</button>
        <button onclick="switchToJoin()">Dołącz (Multi)</button>
    </div>

    <div id="screen-game" class="screen">
        <div id="info-round" style="font-size: 12px; opacity: 0.7;"></div>
        <div id="game-category" class="category-label"></div>
        <div class="question-box" id="game-question"></div>
        
        <div id="solo-controls">
            <button id="btn-solo-show-hint" onclick="showHint()">Pokaż podpowiedź</button>
            <div id="solo-hint-text" class="hidden" style="color:var(--warning); text-align:center; padding:10px;"></div>
            <button id="btn-solo-check-answer" onclick="checkAnswer()">Sprawdź odpowiedź</button>
            <div id="solo-answer-eval" class="hidden">
                <div style="background:rgba(0,255,0,0.2); padding:10px; text-align:center; margin:10px 0;">
                    <span id="solo-game-answer"></span>
                </div>
                <button onclick="nextSolo(true)">Dobrze</button>
                <button onclick="nextSolo(false)">Źle</button>
            </div>
        </div>
    </div>

    <div id="screen-solo-result" class="screen">
        <h2>Wynik</h2>
        <p style="text-align:center; font-size: 24px;"><span id="solo-final-score">0</span> / <span id="solo-final-total">0</span></p>
        <button onclick="location.reload()">Wróć do Menu</button>
    </div>
</div>

<script>
    let dbQuestions = [], soloQuestions = [], soloScore = 0, currentRound = 1, totalRounds = 10, currentQ = null;

    async function loadQuestions() {
        const res = await fetch('questions.json');
        dbQuestions = await res.json();
    }

    function startSolo() {
        loadQuestions().then(() => {
            soloQuestions = [...dbQuestions];
            totalRounds = 10;
            currentRound = 1;
            soloScore = 0;
            document.getElementById('logo-area').classList.add('hidden');
            document.getElementById('screen-role').classList.remove('active');
            document.getElementById('screen-game').classList.add('active');
            nextSolo(null);
        });
    }

    function nextSolo(isCorrect) {
        if (isCorrect !== null) if (isCorrect) soloScore++;
        if (currentRound > totalRounds) {
            document.getElementById('screen-game').classList.remove('active');
            document.getElementById('screen-solo-result').classList.add('active');
            document.getElementById('solo-final-score').innerText = soloScore;
            document.getElementById('solo-final-total').innerText = totalRounds;
            return;
        }
        
        currentQ = soloQuestions[Math.floor(Math.random() * soloQuestions.length)];
        document.getElementById('info-round').innerText = `Runda: ${currentRound}/${totalRounds}`;
        document.getElementById('game-category').innerText = "Kategoria: " + (currentQ.category || "Brak");
        document.getElementById('game-question').innerText = currentQ.question;
        document.getElementById('solo-game-answer').innerText = currentQ.answer;
        document.getElementById('solo-hint-text').innerText = currentQ.hint;
        
        document.getElementById('solo-hint-text').classList.add('hidden');
        document.getElementById('btn-solo-show-hint').classList.remove('hidden');
        document.getElementById('btn-solo-check-answer').classList.remove('hidden');
        document.getElementById('solo-answer-eval').classList.add('hidden');
        currentRound++;
    }

    function showHint() {
        document.getElementById('btn-solo-show-hint').classList.add('hidden');
        document.getElementById('solo-hint-text').classList.remove('hidden');
    }

    function checkAnswer() {
        document.getElementById('btn-solo-check-answer').classList.add('hidden');
        document.getElementById('solo-answer-eval').classList.remove('hidden');
    }

    function switchToHost() { alert("Funkcja Multi w budowie."); }
    function switchToJoin() { alert("Funkcja Multi w budowie."); }
</script>
</body>
</html>
